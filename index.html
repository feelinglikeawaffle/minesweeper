<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decksweeper A.1.93</title>
<style>
  body {
    background:#1b1b1b;
    color:#f5f5f5;
    font-family:system-ui, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  h1 { margin:0 0 10px; }
  #topBar {
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:10px;
  }
  #board {
    display:grid;
    grid-template-columns:repeat(20,28px);
    grid-gap:2px;
    margin-top:10px;
  }
  .cell {
    width:28px;
    height:28px;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:3px;
    font-size:14px;
    transition:box-shadow 0.2s, background 0.2s, transform 0.1s;
  }
  .revealed { background:#777; cursor:default; }
  .mine.revealed { background:#b00; }
  .flagged { background:#224; color:#ff0; }

  /* claimed states after mine shuffles */
  .claimedMine {
    background:#224 !important;
    color:#ffeb3b !important;
    box-shadow:0 0 6px rgba(34,68,136,0.6);
  }
  .claimedSafe {
    background:#6b8cff !important;
    color:#fff !important;
    box-shadow:0 0 6px rgba(107,140,255,0.35);
  }

  #activeBar {
    margin-top:15px;
    padding:8px;
    background:#222;
    border:1px solid #555;
    width:560px;
  }
  #activeCards button {
    margin:3px;
    padding:4px 8px;
    background:#444;
    color:#f5f5f5;
    border:1px solid #666;
    border-radius:3px;
    cursor:pointer;
    font-size:12px;
  }
  #activeCards button:hover { background:#555; }
  .activeCardButton {
    background:#3b6aff !important;
    border:1px solid #6a8dff !important;
    color:white !important;
  }

  #shop {
    margin-top:20px;
    padding:10px;
    background:#222;
    border:1px solid #555;
    width:560px;
    display:none;
  }
  .card {
    background:#333;
    padding:8px;
    margin:5px 0;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
  }
  .card:hover { background:#444; }
  .rare { border-left:4px solid #4fc3f7; }
  .epic { border-left:4px solid gold; }
  .fools { border-left:4px solid #ff4081; }

  /* X-ray glow */
  .glowMine {
    animation: glowMineAnim 1.5s ease-out;
  }
  @keyframes glowMineAnim {
    0% { box-shadow:0 0 0px rgba(255,0,0,0); }
    50% { box-shadow:0 0 12px rgba(255,0,0,0.8); }
    100% { box-shadow:0 0 0px rgba(255,0,0,0); }
  }

  /* wrong flag shake */
  .wrongFlag {
    animation: wrongFlagAnim 0.5s;
  }
  @keyframes wrongFlagAnim {
    0% { transform:translateX(0px); }
    25% { transform:translateX(-3px); }
    50% { transform:translateX(3px); }
    75% { transform:translateX(-3px); }
    100% { transform:translateX(0px); }
  }
</style>
</head>
<body>

<h1>Decksweeper A.1.93</h1>
<div id="topBar">
  <div>Coins: <span id="coins">0</span></div>
  <button onclick="newGame()">New Game</button>
</div>

<div id="board"></div>

<div id="activeBar">
  <h3>Your Cards</h3>
  <div id="activeCards"></div>
</div>

<div id="shop">
  <h2>Shop</h2>
  <div id="shopCards"></div>
  <button onclick="closeShop()">Skip</button>
</div>

<script>
const ROWS = 20;
const COLS = 20;
const MINES_BASE = 50;

let board = [];
let coins = 0;
let gameOver = false;
let totalMines = MINES_BASE;

let passives = {
  coinMagnet: 0,
  thickGloves: false,
  safeStep: false,
  extraLife: false,
  insurance: false,
  doubleNext: false,
  adjBonus: false,
  cornerBonus: false,
  flagBonus: false,
  zeroBonus: false,
  goldenPick: false,
  mercyCull: false,
  mineTax: false,
  guardianAngel: false,
  entropySurge: false
};

let activeCards = [];

let probeMode = false;
let excavatorMode = false;
let vacuumMode = false;
let scanMode = false;
let magnet2Mode = null; // target tile for Mine Magnetism II
let xrayTurns = 0;

const CARD_POOL = [
  // Economy / logic
  {name:"Double Dig", rarity:"common", type:"economy", cost:8, effect:"doubleNext",
   desc:"Next revealed tile gives double coins."},
  {name:"Miner’s Touch", rarity:"common", type:"economy", cost:10, effect:"adjBonus",
   desc:"Next reveal gains +1 coin per adjacent number."},
  {name:"Treasure Map", rarity:"rare", type:"economy", cost:20, effect:"cornerBonus",
   desc:"Next corner tile you reveal gives +10 coins."},
  {name:"Lucky Flag", rarity:"common", type:"economy", cost:12, effect:"flagBonus",
   desc:"Next correct flag gives +5 coins."},
  {name:"Golden Chain", rarity:"rare", type:"economy", cost:25, effect:"zeroBonus",
   desc:"Next zero-region clear gives +10 extra coins."},

  // Board manipulation / utility
  {name:"Excavator", rarity:"rare", type:"utility", cost:20, effect:"excavator",
   desc:"Next click reveals a 3×3 area around it."},
  {name:"Brushfire", rarity:"common", type:"utility", cost:10, effect:"brushfire",
   desc:"Next zero reveal aggressively spreads to nearby zeros."},
  {name:"Probe", rarity:"common", type:"logic", cost:8, effect:"probe",
   desc:"Click a tile to see if it’s a mine without triggering it."},
  {name:"Scanner", rarity:"common", type:"logic", cost:10, effect:"scan",
   desc:"Click a tile to see how many mines are in a 5×5 area."},
  {name:"Flag Checker", rarity:"rare", type:"logic", cost:18, effect:"flagCheck",
   desc:"Checks all flags. Correct flags glow green, wrong flags shake red."},
  {name:"Flag Amnesty", rarity:"rare", type:"utility", cost:22, effect:"flagAmnesty",
   desc:"Remove all flags. Gain 5 coins for each correct flag."},

  // Mine control / power
  {name:"Defuser", rarity:"rare", type:"power", cost:25, effect:"defuse",
   desc:"Remove one random mine from the board."},
  {name:"Terraform", rarity:"fools", type:"chaos", cost:55, effect:"terraform",
   desc:"Turn 10 random tiles safe. Could move danger closer."},
  {name:"Mine Vacuum", rarity:"fools", type:"chaos", cost:60, effect:"vacuum",
   desc:"Remove all mines in a straight line from a chosen tile."},
  {name:"Swap", rarity:"fools", type:"chaos", cost:18, effect:"swap",
   desc:"Swap mine status of two unrevealed tiles. Could help or hurt."},
  {name:"Magnet", rarity:"fools", type:"chaos", cost:45, effect:"magnet",
   desc:"Pull mines one step toward center. Can make things worse."},
  {name:"Mine Magnetism II", rarity:"epic", type:"power", cost:55, effect:"magnet2",
   desc:"Click a tile to pull all mines one step toward it."},
  {name:"Mutation Pulse", rarity:"epic", type:"chaos", cost:50, effect:"mutationPulse",
   desc:"10 safe tiles become mines and 10 mines become safe."},
  {name:"Boomerang Bombs", rarity:"fools", type:"chaos", cost:35, effect:"boomerangBombs",
   desc:"All mines shift one tile in a random direction."},

  // Power cards
  {name:"Time Stop", rarity:"epic", type:"power", cost:50, effect:"timeStop",
   desc:"Reveal 5 tiles for free without triggering mines."},
  {name:"X-Ray Vision", rarity:"epic", type:"power", cost:60, effect:"xray",
   desc:"Nearby mines may glow softly for the next 3 turns."},
  {name:"Golden Pickaxe", rarity:"epic", type:"economy", cost:70, effect:"goldenPick",
   desc:"All reveals this turn give 5× coins."},

  // Passives
  {name:"Coin Magnet", rarity:"rare", type:"economy", cost:25, effect:"passive_coin",
   desc:"Permanently gain +1 coin per revealed tile."},
  {name:"Thick Gloves", rarity:"rare", type:"defense", cost:30, effect:"passive_gloves",
   desc:"First misclick each game is ignored."},
  {name:"Reinforced Boots", rarity:"rare", type:"defense", cost:30, effect:"passive_boots",
   desc:"You can step on one mine without dying."},
  {name:"Bomb Insurance", rarity:"rare", type:"defense", cost:20, effect:"insurance",
   desc:"Survive the next explosion."},
  {name:"Guardian Angel", rarity:"rare", type:"defense", cost:35, effect:"guardianAngel",
   desc:"Prevent death once, then add 10 mines and clear a 3×3 safe zone."},
  {name:"Mine Tax", rarity:"fools", type:"chaos", cost:20, effect:"mineTax",
   desc:"Buying cards spawns 5% more mines, but reveals give +2 coins."},
  {name:"Entropy Surge", rarity:"fools", type:"chaos", cost:40, effect:"entropySurge",
   desc:"Each turn, 1 safe tile becomes a mine and 1 mine becomes safe."},

  // High-risk fools / chaos
  {name:"Earthquake", rarity:"fools", type:"chaos", cost:40, effect:"earthquake",
   desc:"Shuffle all mines, recalc numbers, and fix revealed tiles/flags."},
  {name:"Fate Flip", rarity:"fools", type:"chaos", cost:45, effect:"fateFlip",
   desc:"50% remove 30% mines, 50% add 30% more mines."},
  {name:"Judgment Flags", rarity:"fools", type:"chaos", cost:30, effect:"judgmentFlags",
   desc:"Checks all flags; each wrong one spawns 10% more mines and becomes claimed safe."},
  {name:"Mercy Cull", rarity:"rare", type:"defense", cost:35, effect:"mercyCull",
   desc:"Remove 20% of mines, but any wrong flag kills you instantly."},
  {name:"1UP", rarity:"fools", type:"chaos", cost:35, effect:"oneUp",
   desc:"Gain +1 life. When used, 25% more mines spawn and board recalculates."}
];

function rarityWeight(r) {
  if (r === "common") return 5;
  if (r === "rare") return 3;
  if (r === "epic") return 1;
  if (r === "fools") return 1;
  return 1;
}

function getRandomCard() {
  let total = 0;
  CARD_POOL.forEach(c => total += rarityWeight(c.rarity));
  let roll = Math.random() * total;
  for (let card of CARD_POOL) {
    roll -= rarityWeight(card.rarity);
    if (roll <= 0) return card;
  }
  return CARD_POOL[CARD_POOL.length - 1];
}

function newGame() {
  board = [];
  coins = 0;
  gameOver = false;
  totalMines = MINES_BASE;
  passives = {
    coinMagnet: 0,
    thickGloves: false,
    safeStep: false,
    extraLife: false,
    insurance: false,
    doubleNext: false,
    adjBonus: false,
    cornerBonus: false,
    flagBonus: false,
    zeroBonus: false,
    goldenPick: false,
    mercyCull: false,
    mineTax: false,
    guardianAngel: false,
    entropySurge: false
  };
  activeCards = [];
  probeMode = false;
  excavatorMode = false;
  vacuumMode = false;
  scanMode = false;
  magnet2Mode = null;
  xrayTurns = 0;

  document.getElementById("coins").textContent = coins;
  document.getElementById("activeCards").innerHTML = "";
  document.getElementById("shop").style.display = "none";

  for (let r=0; r<ROWS; r++) {
    let row = [];
    for (let c=0; c<COLS; c++) {
      row.push({
        r, c,
        mine:false,
        revealed:false,
        flagged:false,
        adj:0,
        el:null
      });
    }
    board.push(row);
  }

  let placed = 0;
  while (placed < totalMines) {
    let r = Math.floor(Math.random()*ROWS);
    let c = Math.floor(Math.random()*COLS);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      placed++;
    }
  }

  computeAdjacents();
  drawBoard();
}

function computeAdjacents() {
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (board[r][c].mine) {
        board[r][c].adj = -1;
        continue;
      }
      let count = 0;
      for (let dr=-1; dr<=1; dr++) {
        for (let dc=-1; dc<=1; dc++) {
          if (dr===0 && dc===0) continue;
          let nr=r+dr, nc=c+dc;
          if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].mine)
            count++;
        }
      }
      board[r][c].adj = count;
    }
  }
}

function drawBoard() {
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      const div = document.createElement("div");
      div.className = "cell";
      div.dataset.r = r;
      div.dataset.c = c;
      div.onclick = () => clickCell(r,c);
      div.oncontextmenu = (e) => { e.preventDefault(); flagCell(r,c); };
      cell.el = div;
      boardEl.appendChild(div);
    }
  }
}

function clickCell(r,c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (probeMode) {
    alert(cell.mine ? "This is a MINE" : "This is SAFE");
    probeMode = false;
    return;
  }

  if (scanMode) {
    let count = 0;
    for (let dr=-2; dr<=2; dr++) {
      for (let dc=-2; dc<=2; dc++) {
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].mine)
          count++;
      }
    }
    alert("Scanner: " + count + " mines in 5×5 area.");
    scanMode = false;
    return;
  }

  if (vacuumMode) {
    for (let cc=0; cc<COLS; cc++) {
      board[r][cc].mine = false;
    }
    totalMines = countMines();
    updateAfterMineChange();
    alert("Mine Vacuum cleared a row.");
    vacuumMode = false;
    if (!gameOver) endTurn();
    return;
  }

  if (magnet2Mode) {
    applyMineMagnetism2(magnet2Mode.r, magnet2Mode.c);
    magnet2Mode = null;
    if (!gameOver) endTurn();
    return;
  }

  if (excavatorMode) {
    for (let dr=-1; dr<=1; dr++) {
      for (let dc=-1; dc<=1; dc++) {
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<COLS && nc>=0 && nc<COLS) {
          reveal(nr,nc);
        }
      }
    }
    excavatorMode = false;
  } else {
    reveal(r,c);
  }

  if (!gameOver && xrayTurns > 0) {
    xrayGlow(r,c);
    xrayTurns--;
  }

  if (!gameOver) endTurn();
}

function endTurn() {
  if (passives.entropySurge) {
    entropyStep();
  }
  openShop();
}

function reveal(r,c) {
  const cell = board[r][c];
  if (cell.revealed) return;

  cell.revealed = true;
  cell.el.classList.add("revealed");

  let gain = 1 + passives.coinMagnet;
  if (cell.adj > 0) gain += 1;
  if (passives.adjBonus) {
    gain += cell.adj;
    passives.adjBonus = false;
  }
  if (passives.doubleNext) {
    gain *= 2;
    passives.doubleNext = false;
  }
  if (passives.goldenPick) {
    gain *= 5;
  }
  if (passives.mineTax) {
    gain += 2;
  }
  coins += gain;
  document.getElementById("coins").textContent = coins;

  if (cell.mine) {
    if (passives.extraLife) {
      passives.extraLife = false;
      alert("1UP saved you! But more mines have spawned...");
      let extra = Math.floor(totalMines * 0.25);
      spawnRandomMines(extra);
      totalMines = countMines();
      updateAfterMineChange();
      return;
    }

    if (passives.guardianAngel) {
      passives.guardianAngel = false;
      alert("Guardian Angel saved you! Clearing a 3×3 safe zone and adding 10 mines.");
      clearSafeZone(r,c);
      spawnRandomMines(10);
      totalMines = countMines();
      updateAfterMineChange();
      return;
    }

    if (passives.safeStep) {
      passives.safeStep = false;
      cell.el.classList.add("mine");
      alert("Reinforced Boots saved you from a mine!");
      return;
    }

    if (passives.insurance) {
      passives.insurance = false;
      cell.el.classList.add("mine");
      alert("Bomb Insurance saved you from dying.");
      return;
    }

    cell.el.classList.add("mine");
    alert("BOOM! You hit a mine.");
    gameOver = true;
    revealAllMines();
    return;
  }

  if (cell.adj > 0) {
    cell.el.textContent = cell.adj;
  } else {
    let zeroTriggered = true;
    for (let dr=-1; dr<=1; dr++) {
      for (let dc=-1; dc<=1; dc++) {
        if (dr===0 && dc===0) continue;
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !board[nr][nc].mine) {
          if (!board[nr][nc].revealed) reveal(nr,nc);
        }
      }
    }
    if (zeroTriggered && passives.zeroBonus) {
      coins += 10;
      document.getElementById("coins").textContent = coins;
      passives.zeroBonus = false;
    }
  }

  if (passives.cornerBonus &&
      ((r===0 || r===ROWS-1) && (c===0 || c===COLS-1))) {
    coins += 10;
    document.getElementById("coins").textContent = coins;
    passives.cornerBonus = false;
  }
}

function flagCell(r,c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed) return;
  const wasFlagged = cell.flagged;
  cell.flagged = !cell.flagged;
  cell.el.classList.toggle("flagged");

  if (!wasFlagged && cell.flagged && passives.flagBonus && cell.mine) {
    coins += 5;
    document.getElementById("coins").textContent = coins;
    passives.flagBonus = false;
  }

  if (passives.mercyCull && cell.flagged && !cell.mine) {
    alert("Mercy Cull: wrong flag! Instant death.");
    gameOver = true;
    revealAllMines();
  }
}

function revealAllMines() {
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (cell.mine) {
        cell.revealed = true;
        cell.el.classList.add("revealed","mine");
        cell.el.textContent = "💣";
      }
    }
  }
}

function xrayGlow(r,c) {
  for (let dr=-2; dr<=2; dr++) {
    for (let dc=-2; dc<=2; dc++) {
      let nr = r + dr, nc = c + dc;
      if (nr<0 || nr>=ROWS || nc<0 || nc>=COLS) continue;
      let cell = board[nr][nc];
      if (cell.mine && Math.random() < 0.7) {
        cell.el.classList.add("glowMine");
        setTimeout(() => cell.el.classList.remove("glowMine"), 1500);
      }
    }
  }
}

function flagCheck() {
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (!cell.flagged) continue;

      if (cell.mine) {
        cell.el.style.boxShadow = "0 0 10px 3px lime";
        setTimeout(() => cell.el.style.boxShadow = "", 800);
      } else {
        cell.el.classList.add("wrongFlag");
        setTimeout(() => cell.el.classList.remove("wrongFlag"), 500);
      }
    }
  }
}

function openShop() {
  const shop = document.getElementById("shop");
  const shopCards = document.getElementById("shopCards");
  shopCards.innerHTML = "";

  let options = [];
  for (let i=0; i<3; i++) {
    options.push(getRandomCard());
  }

  options.forEach(card => {
    const div = document.createElement("div");
    let rarityClass = card.rarity==="rare" ? "rare" :
                      card.rarity==="epic" ? "epic" :
                      card.rarity==="fools" ? "fools" : "";
    div.className = "card " + rarityClass;
    div.innerHTML = `
      <b>${card.name}</b> (${card.cost}c, ${card.rarity})<br>
      <i>${card.desc}</i>
    `;
    div.onclick = () => buyCard(card);
    shopCards.appendChild(div);
  });

  shop.style.display = "block";
}

function closeShop() {
  document.getElementById("shop").style.display = "none";
}

function buyCard(card) {
  if (coins < card.cost) {
    alert("Not enough coins.");
    return;
  }
  coins -= card.cost;
  document.getElementById("coins").textContent = coins;

  if (passives.mineTax) {
    let extra = Math.floor(totalMines * 0.05);
    spawnRandomMines(extra);
    totalMines = countMines();
    updateAfterMineChange();
  }

  applyCard(card);
  closeShop();
}

function applyCard(card) {
  switch(card.effect) {
    // passives
    case "passive_coin":
      passives.coinMagnet++;
      alert("Coin Magnet: +" + passives.coinMagnet + " coin per tile.");
      break;
    case "passive_gloves":
      passives.thickGloves = true;
      alert("Thick Gloves: first misclick ignored.");
      break;
    case "passive_boots":
      passives.safeStep = true;
      alert("Reinforced Boots: one free mine step.");
      break;
    case "insurance":
      passives.insurance = true;
      alert("Bomb Insurance: survive the next explosion.");
      break;
    case "goldenPick":
      passives.goldenPick = true;
      alert("Golden Pickaxe: all reveals this turn give ×5 coins.");
      break;
    case "doubleNext":
      passives.doubleNext = true;
      alert("Double Dig: next reveal gives double coins.");
      break;
    case "adjBonus":
      passives.adjBonus = true;
      alert("Miner’s Touch: next reveal gains +1 coin per adjacent number.");
      break;
    case "cornerBonus":
      passives.cornerBonus = true;
      alert("Treasure Map: next corner reveal gives +10 coins.");
      break;
    case "flagBonus":
      passives.flagBonus = true;
      alert("Lucky Flag: next correct flag gives +5 coins.");
      break;
    case "zeroBonus":
      passives.zeroBonus = true;
      alert("Golden Chain: next zero-region gives +10 coins.");
      break;
    case "oneUp":
      passives.extraLife = true;
      alert("1UP acquired: you have an extra life!");
      break;
    case "mercyCull":
      mercyCullEffect();
      break;
    case "mineTax":
      passives.mineTax = true;
      alert("Mine Tax: +2 coins per reveal, but buying cards spawns more mines.");
      break;
    case "guardianAngel":
      passives.guardianAngel = true;
      alert("Guardian Angel: prevents death once, then adds 10 mines.");
      break;
    case "entropySurge":
      passives.entropySurge = true;
      alert("Entropy Surge: each turn, 1 safe tile becomes a mine and 1 mine becomes safe.");
      break;

    // modes / actives
    case "probe":
    case "excavator":
    case "scan":
    case "vacuum":
    case "flagCheck":
    case "flagAmnesty":
    case "defuse":
    case "terraform":
    case "earthquake":
    case "magnet":
    case "swap":
    case "mutationPulse":
    case "boomerangBombs":
    case "magnet2":
    case "fateFlip":
    case "judgmentFlags":
      addActiveCard(card);
      break;

    case "xray":
      xrayTurns = 3;
      alert("X-Ray Vision: nearby mines may glow for the next 3 turns.");
      break;

    default:
      addActiveCard(card);
      break;
  }
}

function addActiveCard(card) {
  activeCards.push({effect:card.effect, name:card.name});
  const btn = document.createElement("button");
  btn.textContent = card.name;
  btn.classList.add("activeCardButton");
  btn.onclick = () => useActiveCard(card.effect, btn);
  document.getElementById("activeCards").appendChild(btn);
}

function useActiveCard(effect, btn) {
  switch(effect) {
    case "probe":
      probeMode = true;
      alert("Probe: click a tile to inspect it.");
      break;
    case "excavator":
      excavatorMode = true;
      alert("Excavator: next click reveals 3×3.");
      break;
    case "scan":
      scanMode = true;
      alert("Scanner: click a tile to scan 5×5.");
      break;
    case "vacuum":
      vacuumMode = true;
      alert("Mine Vacuum: click a tile to clear its row.");
      break;
    case "flagCheck":
      flagCheck();
      break;
    case "flagAmnesty":
      flagAmnestyEffect();
      break;
    case "defuse":
      removeRandomMine();
      break;
    case "terraform":
      terraform();
      break;
    case "earthquake":
      earthquake();
      break;
    case "magnet":
      magnet();
      break;
    case "swap":
      swapTwoTiles();
      break;
    case "mutationPulse":
      mutationPulse();
      break;
    case "boomerangBombs":
      boomerangBombs();
      break;
    case "magnet2":
      magnet2Mode = {r:0,c:0};
      alert("Mine Magnetism II: click a tile to pull mines toward it.");
      magnet2Mode = null;
      break;
    case "fateFlip":
      fateFlip();
      break;
    case "judgmentFlags":
      judgmentFlagsEffect();
      break;
    default:
      alert("Used card: " + effect + " (placeholder effect).");
  }
  btn.remove();
  activeCards = activeCards.filter(c => c.effect !== effect);
}

/* Mine-changing helpers */

function countMines() {
  let n = 0;
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (board[r][c].mine) n++;
  return n;
}

function spawnRandomMines(n) {
  let tries = 0;
  while (n > 0 && tries < 10000) {
    let r = Math.floor(Math.random()*ROWS);
    let c = Math.floor(Math.random()*COLS);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      n--;
    }
    tries++;
  }
  computeAdjacents();
  updateAfterMineChange();
}

function removeRandomMine() {
  let mines = [];
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (board[r][c].mine && !board[r][c].revealed)
        mines.push(board[r][c]);

  if (mines.length === 0) {
    alert("No removable mines found.");
    return;
  }

  let m = mines[Math.floor(Math.random()*mines.length)];
  m.mine = false;
  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Defuser removed a random mine.");
}

function terraform() {
  let changed = 0;
  for (let i=0; i<10; i++) {
    let r = Math.floor(Math.random()*ROWS);
    let c = Math.floor(Math.random()*COLS);
    if (board[r][c].mine) {
      board[r][c].mine = false;
      changed++;
    }
  }
  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Terraform changed " + changed + " tiles to safe.");
}

function earthquake() {
  let mines = [];
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      mines.push(board[r][c].mine);

  mines.sort(() => Math.random() - 0.5);

  let i = 0;
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      board[r][c].mine = mines[i++];

  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Earthquake reshuffled the mines.");
}

function magnet() {
  const centerR = Math.floor(ROWS/2);
  const centerC = Math.floor(COLS/2);
  let newMines = Array.from({length:ROWS}, () => Array(COLS).fill(false));

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (!board[r][c].mine) continue;
      let dr = centerR > r ? 1 : (centerR < r ? -1 : 0);
      let dc = centerC > c ? 1 : (centerC < c ? -1 : 0);
      let nr = r + dr;
      let nc = c + dc;
      if (nr<0 || nr>=ROWS || nc<0 || nc>=COLS) {
        nr = r; nc = c;
      }
      newMines[nr][nc] = true;
    }
  }

  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      board[r][c].mine = newMines[r][c];

  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Magnet pulled mines toward the center.");
}

function applyMineMagnetism2(tr,tc) {
  let newMines = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (!board[r][c].mine) continue;
      let dr = tr > r ? 1 : (tr < r ? -1 : 0);
      let dc = tc > c ? 1 : (tc < c ? -1 : 0);
      let nr = r + dr;
      let nc = c + dc;
      if (nr<0 || nr>=ROWS || nc<0 || nc>=COLS) {
        nr = r; nc = c;
      }
      newMines[nr][nc] = true;
    }
  }
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      board[r][c].mine = newMines[r][c];

  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Mine Magnetism II pulled mines toward your chosen tile.");
}

function swapTwoTiles() {
  let safe = [];
  let mines = [];
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (cell.revealed) continue;
      if (cell.mine) mines.push(cell);
      else safe.push(cell);
    }
  }
  if (safe.length === 0 || mines.length === 0) {
    alert("Swap had no effect.");
    return;
  }
  let a = safe[Math.floor(Math.random()*safe.length)];
  let b = mines[Math.floor(Math.random()*mines.length)];
  a.mine = true;
  b.mine = false;

  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Swap exchanged a safe tile with a mine.");
}

function mutationPulse() {
  let safeTiles = [];
  let mineTiles = [];
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (cell.mine) mineTiles.push(cell);
      else safeTiles.push(cell);
    }
  }
  for (let i=0; i<10 && safeTiles.length>0; i++) {
    let idx = Math.floor(Math.random()*safeTiles.length);
    safeTiles[idx].mine = true;
    safeTiles.splice(idx,1);
  }
  for (let i=0; i<10 && mineTiles.length>0; i++) {
    let idx = Math.floor(Math.random()*mineTiles.length);
    mineTiles[idx].mine = false;
    mineTiles.splice(idx,1);
  }
  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Mutation Pulse shuffled mines and safe tiles.");
}

function boomerangBombs() {
  const dirs = [
    {dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}
  ];
  const d = dirs[Math.floor(Math.random()*dirs.length)];
  let newMines = Array.from({length:ROWS}, () => Array(COLS).fill(false));
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (!board[r][c].mine) continue;
      let nr = r + d.dr;
      let nc = c + d.dc;
      if (nr<0 || nr>=ROWS || nc<0 || nc>=COLS) {
        nr = r; nc = c;
      }
      newMines[nr][nc] = true;
    }
  }
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      board[r][c].mine = newMines[r][c];

  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
  alert("Boomerang Bombs shifted all mines.");
}

function fateFlip() {
  if (Math.random() < 0.5) {
    let toRemove = Math.floor(totalMines * 0.3);
    let mines = [];
    for (let r=0; r<ROWS; r++)
      for (let c=0; c<COLS; c++)
        if (board[r][c].mine) mines.push(board[r][c]);
    while (toRemove > 0 && mines.length > 0) {
      let idx = Math.floor(Math.random()*mines.length);
      mines[idx].mine = false;
      mines.splice(idx,1);
      toRemove--;
    }
    alert("Fate Flip: removed 30% of mines!");
  } else {
    let extra = Math.floor(totalMines * 0.3);
    spawnRandomMines(extra);
    alert("Fate Flip: added 30% more mines!");
  }
  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
}

function judgmentFlagsEffect() {
  let wrongCount = 0;
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (!cell.flagged) continue;
      if (!cell.mine) wrongCount++;
    }
  }
  if (wrongCount === 0) {
    alert("Judgment Flags: all your flags are correct!");
  } else {
    let extra = Math.floor(totalMines * 0.1 * wrongCount);
    spawnRandomMines(extra);
    totalMines = countMines();
    alert("Judgment Flags: " + wrongCount + " wrong flags spawned more mines.");
  }
  computeAdjacents();
  updateAfterMineChange();
}

function mercyCullEffect() {
  let toRemove = Math.floor(totalMines * 0.2);
  let mines = [];
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (board[r][c].mine) mines.push(board[r][c]);
  while (toRemove > 0 && mines.length > 0) {
    let idx = Math.floor(Math.random()*mines.length);
    mines[idx].mine = false;
    mines.splice(idx,1);
    toRemove--;
  }
  totalMines = countMines();
  passives.mercyCull = true;
  computeAdjacents();
  updateAfterMineChange();
  alert("Mercy Cull removed 20% of mines. But now, any wrong flag kills you.");
}

function flagAmnestyEffect() {
  let correct = 0;
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (!cell.flagged) continue;
      if (cell.mine) correct++;
      cell.flagged = false;
      cell.el.classList.remove("flagged");
      cell.revealed = true;
      cell.el.classList.add("revealed");
      cell.el.textContent = cell.adj > 0 ? cell.adj : "";
    }
  }
  if (correct > 0) {
    coins += correct * 5;
    document.getElementById("coins").textContent = coins;
  }
  alert("Flag Amnesty: removed all flags. Correct flags: " + correct);
}

function clearSafeZone(r,c) {
  for (let dr=-1; dr<=1; dr++) {
    for (let dc=-1; dc<=1; dc++) {
      let nr = r+dr, nc = c+dc;
      if (nr<0 || nr>=ROWS || nc<0 || nc>=COLS) continue;
      board[nr][nc].mine = false;
      reveal(nr,nc);
    }
  }
}

function entropyStep() {
  let safeTiles = [];
  let mineTiles = [];
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (cell.mine) mineTiles.push(cell);
      else safeTiles.push(cell);
    }
  }
  if (safeTiles.length > 0) {
    let s = safeTiles[Math.floor(Math.random()*safeTiles.length)];
    s.mine = true;
  }
  if (mineTiles.length > 0) {
    let m = mineTiles[Math.floor(Math.random()*mineTiles.length)];
    m.mine = false;
  }
  totalMines = countMines();
  computeAdjacents();
  updateAfterMineChange();
}

function updateAfterMineChange() {
  computeAdjacents();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r][c];
      if (!cell.el) continue;

      cell.el.classList.remove("claimedMine", "claimedSafe");

      if (cell.revealed) {
        if (cell.mine) {
          cell.flagged = false;
          cell.el.classList.add("claimedMine");
          cell.el.classList.remove("flagged","mine");
          cell.el.textContent = "";
        } else {
          cell.flagged = false;
          cell.el.classList.remove("flagged","mine","claimedMine","claimedSafe");
          cell.el.classList.add("revealed");
          cell.el.textContent = cell.adj > 0 ? cell.adj : "";
          cell.el.style.background = "";
        }
      } else if (cell.flagged && !cell.revealed) {
        if (cell.mine) {
          cell.el.classList.remove("claimedSafe","claimedMine");
        } else {
          cell.flagged = false;
          cell.el.classList.remove("flagged");
          cell.revealed = true;
          cell.el.classList.add("claimedSafe");
          cell.el.textContent = cell.adj > 0 ? cell.adj : "";
        }
      } else {
        if (!cell.revealed && !cell.flagged) {
          cell.el.classList.remove("revealed","flagged","mine","claimedMine","claimedSafe");
          cell.el.textContent = "";
        }
      }
    }
  }
}

newGame();
