<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decksweeper B.2.24</title>
<style>
  body {
    background:#1b1b1b;
    color:#f5f5f5;
    font-family:system-ui, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
  }
  h1 { margin:0 0 10px; }
  #topBar {
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:10px;
  }
  #board {
    display:grid;
    grid-gap:2px;
    margin-top:10px;
  }
  .cell {
    width:28px;
    height:28px;
    background:#333;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:3px;
    font-size:14px;
    transition:box-shadow 0.2s, background 0.2s, transform 0.1s;
  }
  .revealed { background:#777; cursor:default; }
  .mine.revealed { background:#b00; }
  .flagged { background:#224; color:#ff0; }

  .claimedMine {
    background:#224 !important;
    color:#ffeb3b !important;
    box-shadow:0 0 6px rgba(34,68,136,0.6);
  }
  .claimedSafe {
    background:#6b8cff !important;
    color:#fff !important;
    box-shadow:0 0 6px rgba(107,140,255,0.35);
  }

  #activeBar {
    margin-top:15px;
    padding:8px;
    background:#222;
    border:1px solid #555;
    width:560px;
  }
  #activeCards button {
    margin:3px;
    padding:4px 8px;
    background:#444;
    color:#f5f5f5;
    border:1px solid #666;
    border-radius:3px;
    cursor:pointer;
    font-size:12px;
  }
  #activeCards button:hover { background:#555; }
  .activeCardButton {
    background:#3b6aff !important;
    border:1px solid #6a8dff !important;
    color:white !important;
  }

  #shop {
    margin-top:20px;
    padding:10px;
    background:#222;
    border:1px solid #555;
    width:560px;
    display:none;
  }
  .card {
    background:#333;
    padding:8px;
    margin:5px 0;
    border-radius:4px;
    cursor:pointer;
    font-size:13px;
  }
  .card:hover { background:#444; }
  .rare { border-left:4px solid #4fc3f7; }
  .epic { border-left:4px solid gold; }
  .fools { border-left:4px solid #ff4081; }

  .glowMine {
    animation: glowMineAnim 1.5s ease-out;
  }
  @keyframes glowMineAnim {
    0% { box-shadow:0 0 0px rgba(255,0,0,0); }
    50% { box-shadow:0 0 12px rgba(255,0,0,0.8); }
    100% { box-shadow:0 0 0px rgba(255,0,0,0); }
  }

  .wrongFlag {
    animation: wrongFlagAnim 0.5s;
  }
  @keyframes wrongFlagAnim {
    0% { transform:translateX(0px); }
    25% { transform:translateX(-3px); }
    50% { transform:translateX(3px); }
    75% { transform:translateX(-3px); }
    100% { transform:translateX(0px); }
  }
</style>
</head>
<body>

<h1>Decksweeper B.2.24</h1>
<div id="topBar">
  <div>Coins: <span id="coins">0</span></div>
  <button onclick="newGame(true)">New Game</button>
</div>

<div id="board"></div>

<div id="activeBar">
  <h3>Your Cards</h3>
  <div id="activeCards"></div>
</div>

<div id="shop">
  <h2>Shop</h2>
  <div id="shopCards"></div>
  <button onclick="closeShop()">Skip</button>
</div>

<!-- NEW BUTTONS -->
<button id="checkButton" style="display:none; margin-top:20px;" onclick="manualCheckBoard()">
  CHECK BOARD
</button>

<button id="loopButton" style="display:none; margin-top:20px;" onclick="triggerLoop()">
  LOOP
</button>

<script>

let ROWS = 20;
let COLS = 20;
const MINES_BASE = 50;

let board = [];
let coins = 0;
let gameOver = false;
let totalMines = 0;
let cycle = 1;

let passives = {
  coinMagnet: 0,
  thickGloves: false,
  safeStep: false,
  extraLife: false,
  insurance: false,
  doubleNext: false,
  adjBonus: false,
  cornerBonus: false,
  flagBonus: false,
  zeroBonus: false,
  goldenPick: false,
  mercyCull: false,
  mineTax: false,
  guardianAngel: false,
  entropySurge: false
};

let activeCards = [];

let probeMode = false;
let excavatorMode = false;
let vacuumMode = false;
let scanMode = false;
let magnet2Mode = null;
let xrayTurns = 0;

/* -------------------------
   CARD POOL (unchanged)
-------------------------- */

const CARD_POOL = [
  {name:"Double Dig", rarity:"common", type:"economy", cost:8, effect:"doubleNext",
   desc:"Next revealed tile gives double coins."},
  {name:"Miner’s Touch", rarity:"common", type:"economy", cost:10, effect:"adjBonus",
   desc:"Next reveal gains +1 coin per adjacent number."},
  {name:"Treasure Map", rarity:"rare", type:"economy", cost:20, effect:"cornerBonus",
   desc:"Next corner tile you reveal gives +10 coins."},
  {name:"Lucky Flag", rarity:"common", type:"economy", cost:12, effect:"flagBonus",
   desc:"Next correct flag gives +5 coins."},
  {name:"Golden Chain", rarity:"rare", type:"economy", cost:25, effect:"zeroBonus",
   desc:"Next zero-region clear gives +10 extra coins."},

  {name:"Excavator", rarity:"rare", type:"utility", cost:20, effect:"excavator",
   desc:"Next click reveals a 3×3 area around it."},
  {name:"Brushfire", rarity:"common", type:"utility", cost:10, effect:"brushfire",
   desc:"Next zero reveal aggressively spreads to nearby zeros."},
  {name:"Probe", rarity:"common", type:"logic", cost:8, effect:"probe",
   desc:"Click a tile to see if it’s a mine without triggering it."},
  {name:"Scanner", rarity:"common", type:"logic", cost:10, effect:"scan",
   desc:"Click a tile to see how many mines are in a 5×5 area."},
  {name:"Flag Checker", rarity:"rare", type:"logic", cost:18, effect:"flagCheck",
   desc:"Checks all flags. Correct flags glow green, wrong flags shake red."},
  {name:"Flag Amnesty", rarity:"rare", type:"utility", cost:22, effect:"flagAmnesty",
   desc:"Remove all flags. Gain 5 coins for each correct flag."},

  {name:"Defuser", rarity:"rare", type:"power", cost:25, effect:"defuse",
   desc:"Remove one random mine from the board."},
  {name:"Terraform", rarity:"fools", type:"chaos", cost:55, effect:"terraform",
   desc:"Turn 10 random tiles safe. Could move danger closer."},
  {name:"Mine Vacuum", rarity:"fools", type:"chaos", cost:60, effect:"vacuum",
   desc:"Remove all mines in a straight line from a chosen tile."},
  {name:"Swap", rarity:"fools", type:"chaos", cost:18, effect:"swap",
   desc:"Swap mine status of two unrevealed tiles. Could help or hurt."},
  {name:"Magnet", rarity:"fools", type:"chaos", cost:45, effect:"magnet",
   desc:"Pull mines one step toward center. Can make things worse."},
  {name:"Mine Magnetism II", rarity:"epic", type:"power", cost:55, effect:"magnet2",
   desc:"Click a tile to pull all mines one step toward it."},
  {name:"Mutation Pulse", rarity:"epic", type:"chaos", cost:50, effect:"mutationPulse",
   desc:"10 safe tiles become mines and 10 mines become safe."},
  {name:"Boomerang Bombs", rarity:"fools", type:"chaos", cost:35, effect:"boomerangBombs",
   desc:"All mines shift one tile in a random direction."},

  {name:"Time Stop", rarity:"epic", type:"power", cost:50, effect:"timeStop",
   desc:"Reveal 5 tiles for free without triggering mines."},
  {name:"X-Ray Vision", rarity:"epic", type:"power", cost:60, effect:"xray",
   desc:"Nearby mines may glow softly for the next 3 turns."},
  {name:"Golden Pickaxe", rarity:"epic", type:"economy", cost:70, effect:"goldenPick",
   desc:"All reveals this turn give 5× coins."},

  {name:"Coin Magnet", rarity:"rare", type:"economy", cost:25, effect:"passive_coin",
   desc:"Permanently gain +1 coin per revealed tile."},
  {name:"Thick Gloves", rarity:"rare", type:"defense", cost:30, effect:"passive_gloves",
   desc:"First misclick each game is ignored."},
  {name:"Reinforced Boots", rarity:"rare", type:"defense", cost:30, effect:"passive_boots",
   desc:"You can step on one mine without dying."},
  {name:"Bomb Insurance", rarity:"rare", type:"defense", cost:20, effect:"insurance",
   desc:"Survive the next explosion."},
  {name:"Guardian Angel", rarity:"rare", type:"defense", cost:35, effect:"guardianAngel",
   desc:"Prevent death once, then add 10 mines and clear a 3×3 safe zone."},
  {name:"Mine Tax", rarity:"fools", type:"chaos", cost:20, effect:"mineTax",
   desc:"Buying cards spawns 5% more mines, but reveals give +2 coins."},
  {name:"Entropy Surge", rarity:"fools", type:"chaos", cost:40, effect:"entropySurge",
   desc:"Each turn, 1 safe tile becomes a mine and 1 mine becomes safe."},

  {name:"Earthquake", rarity:"fools", type:"chaos", cost:40, effect:"earthquake",
   desc:"Shuffle all mines, recalc numbers, and fix revealed tiles/flags."},
  {name:"Fate Flip", rarity:"fools", type:"chaos", cost:45, effect:"fateFlip",
   desc:"50% remove 30% mines, 50% add 30% more mines."},
  {name:"Judgment Flags", rarity:"fools", type:"chaos", cost:30, effect:"judgmentFlags",
   desc:"Checks all flags; each wrong one spawns 10% more mines and becomes claimed safe."},
  {name:"Mercy Cull", rarity:"rare", type:"defense", cost:35, effect:"mercyCull",
   desc:"Remove 20% of mines, but any wrong flag kills you instantly."},
  {name:"1UP", rarity:"fools", type:"chaos", cost:35, effect:"oneUp",
   desc:"Gain +1 life. When used, 25% more mines spawn and board recalculates."}
];

/* -------------------------
   CARD WEIGHTING
-------------------------- */

function rarityWeight(r) {
  if (r === "common") return 5;
  if (r === "rare") return 3;
  if (r === "epic") return 1;
  if (r === "fools") return 1;
  return 1;
}

function getRandomCard() {
  let total = 0;
  CARD_POOL.forEach(c => total += rarityWeight(c.rarity));
  let roll = Math.random() * total;
  for (let card of CARD_POOL) {
    roll -= rarityWeight(card.rarity);
    if (roll <= 0) return card;
  }
  return CARD_POOL[CARD_POOL.length - 1];
}

/* -------------------------
   NEW GAME + BOARD SETUP
-------------------------- */

function newGame(resetSize=false) {
  if (resetSize) {
    ROWS = 20;
    COLS = 20;
    totalMines = 0;
    cycle = 1;
  }
  if (totalMines === 0) totalMines = MINES_BASE;

  board = [];
  gameOver = false;

  probeMode = false;
  excavatorMode = false;
  vacuumMode = false;
  scanMode = false;
  magnet2Mode = null;
  xrayTurns = 0;

  activeCards = [];
  document.getElementById("activeCards").innerHTML = "";
  document.getElementById("shop").style.display = "none";
  document.getElementById("loopButton").style.display = "none";
  document.getElementById("checkButton").style.display = "none";

  document.getElementById("coins").textContent = coins;

  for (let r=0; r<ROWS; r++) {
    let row = [];
    for (let c=0; c<COLS; c++) {
      row.push({
        r, c,
        mine:false,
        revealed:false,
        flagged:false,
        adj:0,
        el:null
      });
    }
    board.push(row);
  }

  let placed = 0;
  while (placed < totalMines) {
    let r = Math.floor(Math.random()*ROWS);
    let c = Math.floor(Math.random()*COLS);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      placed++;
    }
  }

  computeAdjacents();
  drawBoard();
}

/* -------------------------
   DRAW BOARD
-------------------------- */

function drawBoard() {
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, 28px)`;

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      const div = document.createElement("div");
      div.className = "cell";
      div.dataset.r = r;
      div.dataset.c = c;
      div.onclick = () => clickCell(r,c);
      div.oncontextmenu = (e) => { e.preventDefault(); flagCell(r,c); };
      cell.el = div;
      boardEl.appendChild(div);
    }
  }
}

/* -------------------------
   CLICK HANDLING
-------------------------- */

function clickCell(r,c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (probeMode) {
    alert(cell.mine ? "This is a MINE" : "This is SAFE");
    probeMode = false;
    return;
  }

  if (scanMode) {
    let count = 0;
    for (let dr=-2; dr<=2; dr++) {
      for (let dc=-2; dc<=2; dc++) {
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].mine)
          count++;
      }
    }
    alert("Scanner: " + count + " mines in 5×5 area.");
    scanMode = false;
    return;
  }

  if (vacuumMode) {
    for (let cc=0; cc<COLS; cc++) {
      board[r][cc].mine = false;
    }
    totalMines = countMines();
    updateAfterMineChange();
    alert("Mine Vacuum cleared a row.");
    vacuumMode = false;
    endTurn();
    return;
  }

  if (magnet2Mode) {
    applyMineMagnetism2(r,c);
    magnet2Mode = null;
    endTurn();
    return;
  }

  if (excavatorMode) {
    for (let dr=-1; dr<=1; dr++) {
      for (let dc=-1; dc<=1; dc++) {
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
          reveal(nr,nc);
        }
      }
    }
    excavatorMode = false;
  } else {
    reveal(r,c);
  }

  if (!gameOver && xrayTurns > 0) {
    xrayGlow(r,c);
    xrayTurns--;
  }

  if (!gameOver) {
    checkIfLoopPossible();
    endTurn();
  }
}

/* -------------------------
   FLAGGING
-------------------------- */

function flagCell(r,c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed) return;

  const wasFlagged = cell.flagged;
  cell.flagged = !cell.flagged;
  cell.el.classList.toggle("flagged");

  if (!wasFlagged && cell.flagged && passives.flagBonus && cell.mine) {
    coins += 5;
    document.getElementById("coins").textContent = coins;
    passives.flagBonus = false;
  }

  if (passives.mercyCull && cell.flagged && !cell.mine) {
    alert("Mercy Cull: wrong flag! Instant death.");
    gameOver = true;
    revealAllMines();
    return;
  }

  checkIfLoopPossible();
}

/* -------------------------
   REVEAL LOGIC
-------------------------- */

function reveal(r,c) {
  const cell = board[r][c];
  if (cell.revealed) return;

  cell.revealed = true;
  cell.el.classList.add("revealed");

  let gain = 1 + passives.coinMagnet;
  if (cell.adj > 0) gain += 1;
  if (passives.adjBonus) {
    gain += cell.adj;
    passives.adjBonus = false;
  }
  if (passives.doubleNext) {
    gain *= 2;
    passives.doubleNext = false;
  }
  if (passives.goldenPick) {
    gain *= 5;
  }
  if (passives.mineTax) {
    gain += 2;
  }
  coins += gain;
  document.getElementById("coins").textContent = coins;

  if (cell.mine) {
    return handleMineProtection(r,c);
  }

  if (cell.adj > 0) {
    cell.el.textContent = cell.adj;
  } else {
    for (let dr=-1; dr<=1; dr++) {
      for (let dc=-1; dc<=1; dc++) {
        if (dr===0 && dc===0) continue;
        let nr=r+dr, nc=c+dc;
        if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !board[nr][nc].mine) {
          if (!board[nr][nc].revealed) reveal(nr,nc);
        }
      }
    }
    if (passives.zeroBonus) {
      coins += 10;
      document.getElementById("coins").textContent = coins;
      passives.zeroBonus = false;
    }
  }

  if (passives.cornerBonus &&
      ((r===0 || r===ROWS-1) && (c===0 || c===COLS-1))) {
    coins += 10;
    document.getElementById("coins").textContent = coins;
    passives.cornerBonus = false;
  }

  checkIfLoopPossible();
}

/* -------------------------
   PROTECTION AUTO-FLAG
-------------------------- */

function handleMineProtection(r,c) {
  const cell = board[r][c];

  function autoFlag() {
    cell.revealed = false;
    cell.flagged = true;
    cell.el.classList.remove("revealed");
    cell.el.classList.add("flagged");
    cell.el.textContent = "";
  }

  if (passives.extraLife) {
    passives.extraLife = false;
    autoFlag();
    let extra = Math.floor(totalMines * 0.25);
    spawnRandomMines(extra);
    updateAfterMineChange();
    alert("1UP saved you! Mine auto-flagged.");
    return;
  }

  if (passives.guardianAngel) {
    passives.guardianAngel = false;
    autoFlag();
    clearSafeZone(r,c);
    spawnRandomMines(10);
    updateAfterMineChange();
    alert("Guardian Angel saved you! Mine auto-flagged.");
    return;
  }

  if (passives.safeStep) {
    passives.safeStep = false;
    autoFlag();
    alert("Reinforced Boots saved you! Mine auto-flagged.");
    return;
  }

  if (passives.insurance) {
    passives.insurance = false;
    autoFlag();
    alert("Bomb Insurance saved you! Mine auto-flagged.");
    return;
  }

  cell.el.classList.add("mine");
  alert("BOOM! You hit a mine.");
  gameOver = true;
  revealAllMines();
}

/* -------------------------
   CHECK IF LOOP POSSIBLE
-------------------------- */

function checkIfLoopPossible() {
  if (gameOver) {
    document.getElementById("checkButton").style.display = "none";
    return;
  }

  let maybeSolved = true;

  for (let r=0; r<ROWS && maybeSolved; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];

      if (!cell.mine) {
        if (!cell.revealed && !cell.el.classList.contains("claimedSafe")) {
          maybeSolved = false;
          break;
        }
      } else {
        if (!cell.flagged && !cell.el.classList.contains("claimedMine")) {
          maybeSolved = false;
          break;
        }
      }
    }
  }

  document.getElementById("checkButton").style.display =
    maybeSolved ? "block" : "none";
}

/* -------------------------
   MANUAL CHECK BOARD
-------------------------- */

function manualCheckBoard() {
  let allGood = true;

  for (let r=0; r<ROWS && allGood; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];

      if (!cell.mine) {
        if (!cell.revealed && !cell.el.classList.contains("claimedSafe")) {
          allGood = false;
          break;
        }
        if (cell.flagged) {
          allGood = false;
          break;
        }
      } else {
        if (!cell.flagged && !cell.el.classList.contains("claimedMine")) {
          allGood = false;
          break;
        }
      }
    }
  }

  if (!allGood) {
    alert("Board not solved.");
    return;
  }

  document.getElementById("loopButton").style.display = "block";
}

/* -------------------------
   LOOP / PRESTIGE
-------------------------- */

function triggerLoop() {
  cycle++;
  ROWS += 4;
  COLS += 4;
  totalMines *= 2;

  alert(
    "LOOP COMPLETE!\n" +
    "Cycle: " + cycle +
    "\nNew size: " + ROWS + "×" + COLS +
    "\nMines doubled to: " + totalMines
  );

  document.getElementById("loopButton").style.display = "none";
  document.getElementById("checkButton").style.display = "none";

  newGame(false);
}

/* -------------------------
   MINE-SHUFFLE FIXER
-------------------------- */

function updateAfterMineChange() {
  computeAdjacents();

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const cell = board[r][c];
      if (!cell.el) continue;

      cell.el.classList.remove("claimedMine","claimedSafe");

      if (cell.revealed) {
        if (cell.mine) {
          cell.flagged = false;
          cell.el.classList.add("claimedMine");
          cell.el.textContent = "";
        } else {
          cell.flagged = false;
          cell.el.classList.add("revealed");
          cell.el.textContent = cell.adj > 0 ? cell.adj : "";
        }
      }

      else if (cell.flagged) {
        if (!cell.mine) {
          cell.flagged = false;
          cell.revealed = true;
          cell.el.classList.add("claimedSafe");
          cell.el.textContent = cell.adj > 0 ? cell.adj : "";
        }
      }
    }
  }

  checkIfLoopPossible();
}

/* -------------------------
   END OF FILE
-------------------------- */

newGame(true);
</script>
</body>
</html>
