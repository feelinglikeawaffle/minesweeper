<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Decksweeper</title>
<style>
    body {
        background:#1b1b1b;
        color:white;
        font-family:Arial;
        display:flex;
        flex-direction:column;
        align-items:center;
        padding:20px;
    }
    #board {
        display:grid;
        grid-template-columns:repeat(20,28px);
        grid-gap:2px;
        margin-top:10px;
    }
    .cell {
        width:28px;
        height:28px;
        background:#333;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        border-radius:3px;
        font-size:14px;
    }
    .revealed { background:#777; cursor:default; }
    .mine.revealed { background:#b00; }
    .flagged { background:#224; color:#ff0; }
    #shop {
        margin-top:20px;
        padding:10px;
        background:#222;
        border:1px solid #555;
        width:500px;
        display:none;
    }
    .card {
        background:#333;
        padding:10px;
        margin:5px 0;
        border-radius:4px;
        cursor:pointer;
    }
    .rare { border-left:5px solid #4fc3f7; }
    .epic { border-left:5px solid gold; }
</style>
</head>
<body>

<h1>Decksweeper</h1>
<div>Coins: <span id="coins">0</span></div>
<div id="board"></div>

<div id="shop">
    <h2>Shop</h2>
    <div id="shopCards"></div>
    <button onclick="closeShop()">Skip</button>
</div>

<script>
/* ============================================================
   GAME CONFIG
============================================================ */
const ROWS = 20;
const COLS = 20;
const MINES = 50;

let board = [];
let coins = 0;
let gameOver = false;
let passives = {
    coinMagnet: 0,
    thickGloves: false,
    safeStep: false
};
let activeCards = [];

/* ============================================================
   CARD DEFINITIONS
============================================================ */
const CARD_POOL = [
    // Economy
    {name:"Double Dig", rarity:"common", cost:8, effect:"doubleNext"},
    {name:"Miner’s Touch", rarity:"common", cost:10, effect:"adjBonus"},
    {name:"Treasure Map", rarity:"rare", cost:20, effect:"cornerBonus"},
    {name:"Lucky Flag", rarity:"common", cost:12, effect:"flagBonus"},
    {name:"Golden Chain", rarity:"rare", cost:25, effect:"zeroBonus"},

    // Board Manipulation
    {name:"Excavator", rarity:"rare", cost:20, effect:"excavator"},
    {name:"Brushfire", rarity:"common", cost:10, effect:"brushfire"},
    {name:"Probe", rarity:"common", cost:8, effect:"probe"},
    {name:"Swap", rarity:"rare", cost:18, effect:"swap"},
    {name:"Earthquake", rarity:"epic", cost:40, effect:"earthquake"},

    // Mine Control
    {name:"Defuser", rarity:"rare", cost:25, effect:"defuse"},
    {name:"Scanner", rarity:"common", cost:10, effect:"scan"},
    {name:"Magnet", rarity:"epic", cost:45, effect:"magnet"},
    {name:"Ghost Flag", rarity:"common", cost:10, effect:"ghostFlag"},
    {name:"Bomb Insurance", rarity:"rare", cost:20, effect:"insurance"},

    // Power Cards
    {name:"Time Stop", rarity:"epic", cost:50, effect:"timeStop"},
    {name:"X-Ray Vision", rarity:"epic", cost:60, effect:"xray"},
    {name:"Terraform", rarity:"epic", cost:55, effect:"terraform"},
    {name:"Mine Vacuum", rarity:"epic", cost:60, effect:"vacuum"},
    {name:"Golden Pickaxe", rarity:"epic", cost:70, effect:"goldenPick"},

    // Passives
    {name:"Coin Magnet", rarity:"rare", cost:25, effect:"passive_coin"},
    {name:"Thick Gloves", rarity:"rare", cost:30, effect:"passive_gloves"},
    {name:"Reinforced Boots", rarity:"rare", cost:30, effect:"passive_boots"}
];

/* ============================================================
   BOARD GENERATION
============================================================ */
function newGame() {
    board = [];
    coins = 0;
    gameOver = false;
    document.getElementById("coins").textContent = coins;

    // Build empty board
    for (let r=0; r<ROWS; r++) {
        let row = [];
        for (let c=0; c<COLS; c++) {
            row.push({
                r, c,
                mine:false,
                revealed:false,
                flagged:false,
                adj:0,
                el:null
            });
        }
        board.push(row);
    }

    // Place mines
    let placed = 0;
    while (placed < MINES) {
        let r = Math.floor(Math.random()*ROWS);
        let c = Math.floor(Math.random()*COLS);
        if (!board[r][c].mine) {
            board[r][c].mine = true;
            placed++;
        }
    }

    // Compute adjacency
    for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
            if (board[r][c].mine) continue;
            let count = 0;
            for (let dr=-1; dr<=1; dr++) {
                for (let dc=-1; dc<=1; dc++) {
                    if (dr===0 && dc===0) continue;
                    let nr=r+dr, nc=c+dc;
                    if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].mine)
                        count++;
                }
            }
            board[r][c].adj = count;
        }
    }

    drawBoard();
}

function drawBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";

    for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
            const cell = board[r][c];
            const div = document.createElement("div");
            div.className = "cell";
            div.dataset.r = r;
            div.dataset.c = c;

            div.onclick = () => clickCell(r,c);
            div.oncontextmenu = (e) => { e.preventDefault(); flagCell(r,c); };

            cell.el = div;
            boardEl.appendChild(div);
        }
    }
}

/* ============================================================
   GAMEPLAY
============================================================ */
function clickCell(r,c) {
    if (gameOver) return;
    const cell = board[r][c];
    if (cell.revealed || cell.flagged) return;

    // Active card: Probe
    if (activeCards.includes("probe")) {
        alert("This tile is " + (cell.mine ? "a MINE" : "SAFE"));
        activeCards = activeCards.filter(x=>x!=="probe");
        return;
    }

    // Reveal
    reveal(r,c);

    // Earn coins
    let gain = 1 + passives.coinMagnet;
    if (cell.adj > 0) gain += 1;
    coins += gain;
    document.getElementById("coins").textContent = coins;

    // After every turn → shop
    openShop();
}

function reveal(r,c) {
    const cell = board[r][c];
    if (cell.revealed) return;

    cell.revealed = true;
    cell.el.classList.add("revealed");

    if (cell.mine) {
        if (passives.safeStep) {
            passives.safeStep = false;
            alert("Reinforced Boots saved you");
            return;
        }
        cell.el.classList.add("mine");
        alert("BOOM");
        gameOver = true;
        return;
    }

    if (cell.adj > 0) {
        cell.el.textContent = cell.adj;
    } else {
        // Flood fill
        for (let dr=-1; dr<=1; dr++) {
            for (let dc=-1; dc<=1; dc++) {
                if (dr===0 && dc===0) continue;
                let nr=r+dr, nc=c+dc;
                if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS)
                    if (!board[nr][nc].mine)
                        reveal(nr,nc);
            }
        }
    }
}

function flagCell(r,c) {
    const cell = board[r][c];
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
    cell.el.classList.toggle("flagged");
}

/* ============================================================
   SHOP
============================================================ */
function openShop() {
    const shop = document.getElementById("shop");
    const shopCards = document.getElementById("shopCards");
    shopCards.innerHTML = "";

    let options = [];
    for (let i=0; i<3; i++) {
        options.push( CARD_POOL[Math.floor(Math.random()*CARD_POOL.length)] );
    }

    options.forEach(card => {
        const div = document.createElement("div");
        div.className = "card " + (card.rarity==="rare"?"rare": card.rarity==="epic"?"epic":"");
        div.innerHTML = `<b>${card.name}</b> (${card.cost}c)<br>${card.effect}`;
        div.onclick = () => buyCard(card);
        shopCards.appendChild(div);
    });

    shop.style.display = "block";
}

function closeShop() {
    document.getElementById("shop").style.display = "none";
}

function buyCard(card) {
    if (coins < card.cost) {
        alert("Not enough coins");
        return;
    }
    coins -= card.cost;
    document.getElementById("coins").textContent = coins;

    applyCard(card);
    closeShop();
}

/* ============================================================
   CARD EFFECTS
============================================================ */
function applyCard(card) {
    switch(card.effect) {
        case "passive_coin": passives.coinMagnet++; break;
        case "passive_gloves": passives.thickGloves = true; break;
        case "passive_boots": passives.safeStep = true; break;

        case "probe": activeCards.push("probe"); break;

        case "defuse":
            removeRandomMine();
            break;

        case "terraform":
            terraform();
            break;

        case "earthquake":
            shuffleBoard();
            break;

        default:
            alert("Card acquired: " + card.name);
    }
}

function removeRandomMine() {
    let mines = [];
    for (let r=0; r<ROWS; r++)
        for (let c=0; c<COLS; c++)
            if (board[r][c].mine) mines.push(board[r][c]);

    if (mines.length === 0) return;

    let m = mines[Math.floor(Math.random()*mines.length)];
    m.mine = false;
    alert("A mine was removed");
}

function terraform() {
    for (let i=0; i<10; i++) {
        let r = Math.floor(Math.random()*ROWS);
        let c = Math.floor(Math.random()*COLS);
        board[r][c].mine = false;
    }
    alert("10 tiles terraformed");
}

function shuffleBoard() {
    let tiles = [];
    for (let r=0; r<ROWS; r++)
        for (let c=0; c<COLS; c++)
            tiles.push(board[r][c].mine);

    tiles.sort(()=>Math.random()-0.5);

    let i=0;
    for (let r=0; r<ROWS; r++)
        for (let c=0; c<COLS; c++)
            board[r][c].mine = tiles[i++];

    alert("Earthquake shuffled the mines");
}

newGame();
</script>
</body>
</html>
